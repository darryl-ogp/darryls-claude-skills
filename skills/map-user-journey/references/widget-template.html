<!--
Widget template for the map-user-journey skill (flowchart-card layout).

Use with mcp__visualize__show_widget. Before the first call, fetch
design tokens via mcp__visualize__read_me with modules: ['diagram',
'data_viz'].

Layout shape: one card per stage, arranged left-to-right with arrows
between them, emotional curve along the top. ALL non-headline detail
(thinks / touchpoints / backstage / opportunities) lives in the
per-stage narrative BELOW the widget, not inside the cards.

Each card holds only:
  - stage number + stage name (user's-perspective verb phrase)
  - dominant emotion + 🔴/🟢 marker
  - one-line summary of what the user does (≤14 words)

Adapt the placeholders:
  {{Persona}} {{Scope}} {{State}}   — header
  {{LEAD}}                          — 1–2 sentence intro
  {{N}}                             — number of stages (aim for 5–6, max 7)
  {{STAGES}}                        — per-stage data (name, score, feels, does, mood)

Stage centres in the emotional-curve SVG:
  x = (i + 0.5) * 100 / N      (percent within viewBox 0..100)
  y = 70 - score * 12          (score 1 → y=58, score 5 → y=10)
-->

<style>
  .jm-wrap {
    padding: 8px 4px 16px;
    color: var(--text-primary, #f5f5f5);
    font-family: var(--font-sans, ui-sans-serif, system-ui, -apple-system, sans-serif);
  }
  .jm-title    { font-weight: 700; font-size: 17px; margin: 0 0 2px; }
  .jm-subtitle { color: var(--text-secondary, #aaa); font-size: 13px; margin: 0 0 14px; line-height: 1.4; }

  .jm-scroll {
    overflow-x: auto;
    overflow-y: visible;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .jm-grid {
    display: grid;
    grid-template-columns: repeat(var(--N, 5), minmax(150px, 1fr));
    column-gap: 28px;     /* room for the → arrow between cards */
    row-gap: 8px;
    min-width: calc(var(--N, 5) * 160px);
    position: relative;
  }

  /* Emotional curve spans the full row above the cards */
  .jm-curve-cell {
    grid-column: 1 / -1;
    height: 72px;
    position: relative;
  }
  .jm-curve-cell svg {
    width: 100%; height: 100%; display: block; overflow: visible;
  }
  .jm-curve-grid { stroke: var(--border, #444); stroke-width: 1; stroke-dasharray: 2 4; }
  .jm-curve-axis { fill: var(--text-tertiary, #888); font-size: 9px; font-family: inherit; }
  .jm-curve-line { stroke: var(--accent, #d24545); stroke-width: 2.5; fill: none; }
  .jm-curve-pt   { stroke: var(--background, #111); stroke-width: 2; }
  .jm-curve-pt.neutral { fill: var(--accent, #d24545); }
  .jm-curve-pt.pain    { fill: #c0392b; }
  .jm-curve-pt.joy     { fill: #1b8a3b; }

  /* Stage cards */
  .jm-card {
    background: var(--surface-elevated, #1f1f1f);
    border: 1.5px solid var(--border, #444);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    min-height: 130px;
  }
  .jm-card.pain { border-color: #c0392b; }
  .jm-card.joy  { border-color: #1b8a3b; }

  /* Arrow between cards (pseudo-element on every card except last) */
  .jm-card:not(:last-of-type)::after {
    content: '→';
    position: absolute;
    right: -22px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
    color: var(--text-tertiary, #888);
    pointer-events: none;
  }

  .jm-stage-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-tertiary, #888);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .jm-stage-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
  }
  .jm-stage-feels {
    font-size: 12px;
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .jm-stage-feels.pain { color: #e07c75; }
  .jm-stage-feels.joy  { color: #69c987; }
  .jm-stage-does {
    font-size: 12px;
    line-height: 1.4;
    color: var(--text-secondary, #ccc);
    margin-top: auto;
  }
</style>

<div class="jm-wrap">
  <h2 class="jm-title">{{Persona}} — {{Scope}} ({{State}})</h2>
  <p class="jm-subtitle">{{LEAD}}</p>

  <div class="jm-scroll">
    <div class="jm-grid" style="--N: {{N}}">

      <!-- Emotional curve -->
      <div class="jm-curve-cell">
        <svg viewBox="0 0 100 72" preserveAspectRatio="none">
          <line x1="0" y1="58" x2="100" y2="58" class="jm-curve-grid"/>
          <line x1="0" y1="34" x2="100" y2="34" class="jm-curve-grid"/>
          <line x1="0" y1="10" x2="100" y2="10" class="jm-curve-grid"/>
          <text x="0.5" y="60" class="jm-curve-axis">low</text>
          <text x="0.5" y="12" class="jm-curve-axis">high</text>
          <!-- path: M (i+0.5)*100/N, 70-score*12 ... -->
          <path d="{{PATH}}" class="jm-curve-line" vector-effect="non-scaling-stroke"/>
          {{POINTS — repeat: <circle cx="(i+0.5)*100/N" cy="70-score*12" r="2.4" class="jm-curve-pt {{pain|joy|neutral}}" vector-effect="non-scaling-stroke"/>}}
        </svg>
      </div>

      <!-- Stage cards (one per stage) -->
      {{For each stage i:}}
      <div class="jm-card {{pain|joy|}}">
        <div class="jm-stage-num">Stage {{i+1}}</div>
        <div class="jm-stage-name">{{Stage name}}</div>
        <div class="jm-stage-feels {{pain|joy|}}">{{🔴|🟢|·}} {{Feels label, 2–5 words}}</div>
        <div class="jm-stage-does">{{Does — ≤14 words}}</div>
      </div>
      {{End}}

    </div>
  </div>
</div>
